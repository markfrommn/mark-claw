name: Exclusion canary

on:
  pull_request:
    paths:
      - "mclaw_core/**"
      - "bin/**"
      - "writers/**"
      - "tests/canary/**"
      - ".github/workflows/canary.yml"
  push:
    branches: [main]
    paths:
      - "mclaw_core/**"
      - "bin/**"
      - "writers/**"
      - "tests/canary/**"
      - ".github/workflows/canary.yml"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run mclaw test --canary
